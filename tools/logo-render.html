<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { padding: 40px; display: inline-block; }
  .lockup {
    display: inline-flex;
    align-items: center;
    gap: 18px;
    padding: 0;
  }
  .divider {
    width: 1px;
    height: 64px;
    background: rgba(42,37,32,0.2);
  }
  .wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1.05;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  .wordmark .make-it {
    font-size: 36px;
    font-weight: 600;
    color: #2a2520;
    letter-spacing: 0.02em;
  }
  .wordmark .media {
    font-size: 36px;
    font-weight: 600;
    font-style: italic;
    letter-spacing: 0.02em;
  }
  .gold .media { color: #c9a84c; }
  .sage .media { color: #7a9e87; }
</style>
</head>
<body>
<div class="lockup ACCENT_CLASS">
  <svg width="84" height="102" viewBox="0 0 56 68" fill="none" aria-hidden="true">
    <circle cx="28" cy="28" r="22" stroke="ACCENT_HEX" stroke-width="2.2" />
    <line x1="28" y1="66" x2="28" y2="2" stroke="#141414" stroke-width="2.4" stroke-linecap="round" />
    <path d="M28 36 C18 29 10 25 10 14 C18 14 28 22 28 36Z" fill="#141414" />
    <path d="M28 22 C38 14 46 11 48 2 C40 3 28 11 28 22Z" fill="ACCENT_HEX" />
    <circle cx="28" cy="2" r="4" fill="ACCENT_HEX" />
  </svg>
  <div class="divider"></div>
  <div class="wordmark">
    <span class="make-it">make it</span>
    <span class="media">media</span>
  </div>
</div>
</body>
</html>
