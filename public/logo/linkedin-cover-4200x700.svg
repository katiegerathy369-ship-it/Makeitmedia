<svg width="4200" height="700" viewBox="0 0 4200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="4200" height="700" fill="#141414"/>

  <!-- Subtle gold gradient glow — right side -->
  <defs>
    <radialGradient id="glow1" cx="0.85" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.15" cy="0.6" r="0.3">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="4200" height="700" fill="url(#glow1)"/>
  <rect width="4200" height="700" fill="url(#glow2)"/>

  <!-- Logo mark — left area -->
  <g transform="translate(320, 180) scale(4.5)">
    <circle cx="28" cy="28" r="22" fill="none" stroke="#c9a84c" stroke-width="2.2"/>
    <line x1="28" y1="66" x2="28" y2="2" stroke="#c9a84c" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M28 36 C18 29 10 25 10 14 C18 14 28 22 28 36Z" fill="#c9a84c"/>
    <path d="M28 22 C38 14 46 11 48 2 C40 3 28 11 28 22Z" fill="rgba(201,168,76,0.5)"/>
    <circle cx="28" cy="2" r="4" fill="#c9a84c"/>
  </g>

  <!-- Divider line -->
  <line x1="680" y1="220" x2="680" y2="480" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>

  <!-- Wordmark -->
  <text x="740" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" fill="#ffffff" letter-spacing="3">make it</text>
  <text x="740" y="440" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" font-style="italic" fill="#c9a84c" letter-spacing="3">media</text>

  <!-- Tagline -->
  <text x="740" y="520" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="300" fill="rgba(255,255,255,0.5)" letter-spacing="4">WEBSITES &amp; MARKETING FOR SMALL BUSINESSES</text>

  <!-- Gold accent line — bottom -->
  <rect x="0" y="694" width="4200" height="6" fill="#c9a84c"/>
</svg>
